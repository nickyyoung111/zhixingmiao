services:
  postgres:
    image: postgres:16-alpine
    container_name: zhixing-miao-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zhixing
      POSTGRES_PASSWORD: zhixing_dev
      POSTGRES_DB: zhixing_miao
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhixing -d zhixing_miao"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zhixing-miao-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  postgres_data:
  redis_data:
